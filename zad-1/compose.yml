version: "3.9"

services:
  web:
    build: .
    command: gunicorn app.flask_app:app --bind 0.0.0.0:5000
    ports:
      - "5000:5000"
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app
    depends_on:
      - redis
      - db

  worker:
    build: .
    command: celery -A app.celery_app.celery worker --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app
    depends_on:
      - redis
      - db

  redis:
    image: redis:7-alpine

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: