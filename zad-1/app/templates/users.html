<!DOCTYPE html>
<html>
<head>
  <title>Users</title>
</head>
<body>
  <h2>Users</h2>

  <table border="1" cellpadding="6">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Surname</th>
      </tr>
    </thead>

    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.name }}</td>
        <td>{{ u.surname }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <p><a href="/">Back</a></p>
</body>
</html>
