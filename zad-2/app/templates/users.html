<!DOCTYPE html>
<html>
<head><title>Users</title></head>
<body>
<h2>Users</h2>

<table border="1">
<tr><th>ID</th><th>Name</th><th>Surname</th></tr>

{% for u in users %}
<tr>
  <td>{{ u.id }}</td>
  <td>{{ u.name }}</td>
  <td>{{ u.surname }}</td>
</tr>
{% endfor %}
</table>

<a href="/">Back</a>
</body>
</html>
